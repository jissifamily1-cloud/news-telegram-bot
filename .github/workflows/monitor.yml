name: news-bot

on:
  workflow_dispatch:
  # cron-job.org가 이 워크플로를 POST로 트리거(README 참조).

permissions:
  contents: write

concurrency:
  group: news-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax check
        run: python -m py_compile engine/monitor_bot.py
      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          REGISTER_PASSWORD:   ${{ secrets.REGISTER_PASSWORD }}
        run: python engine/monitor_bot.py
      - name: Commit config & state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.json state.json
          git diff --cached --quiet || git commit -m "update config/state [skip ci]"
          git pull --rebase origin main || true
          git push
